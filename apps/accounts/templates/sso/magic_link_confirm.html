<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>確認登入</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang TC",
        "Microsoft JhengHei", sans-serif;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #334155 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #0f172a;
      padding: 24px;
    }
    .card {
      width: 100%;
      max-width: 440px;
      background: #fff;
      border-radius: 16px;
      padding: 40px 36px;
      box-shadow: 0 20px 60px rgba(15, 23, 42, 0.35);
      text-align: center;
    }
    .icon {
      width: 64px;
      height: 64px;
      border-radius: 16px;
      background: #dcfce7;
      color: #16a34a;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      margin-bottom: 20px;
    }
    h1 { margin: 0 0 10px; font-size: 22px; }
    p { margin: 0 0 8px; color: #475569; font-size: 14px; line-height: 1.6; }
    .email { color: #0f172a; font-weight: 600; margin-bottom: 24px; }
    button {
      width: 100%;
      padding: 13px;
      font-size: 15px;
      font-weight: 600;
      color: #fff;
      background: #16a34a;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background .15s;
    }
    button:hover { background: #15803d; }
    .hint {
      margin-top: 18px;
      font-size: 12px;
      color: #94a3b8;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <form class="card" method="post" action="{% url 'sso_magic_link' raw_token %}">
    {% csrf_token %}
    <div class="icon">✓</div>
    <h1>確認登入</h1>
    <p>即將以以下帳號登入:</p>
    <p class="email">{{ email }}</p>
    <button type="submit">繼續登入</button>
    <div class="hint">
      此多一步驟是為了防止 Email 安全掃描器自動消耗你的一次性連結。
    </div>
  </form>
</body>
</html>
