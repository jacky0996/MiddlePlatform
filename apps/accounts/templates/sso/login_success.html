<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <title>登入成功 - 中台系統</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang TC", "Microsoft JhengHei", sans-serif;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
      min-height: 100vh;
      margin: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #0f172a;
      padding: 24px;
    }
    .card {
      width: 100%;
      max-width: 720px;
      background: #fff;
      padding: 40px;
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(2, 6, 23, 0.35);
    }
    .header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 8px;
    }
    .logout {
      margin-left: auto;
      font-size: 13px;
      color: #64748b;
      text-decoration: none;
      padding: 6px 12px;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      transition: all .15s ease;
    }
    .logout:hover {
      color: #dc2626;
      border-color: #fecaca;
      background: #fef2f2;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 36px;
      height: 36px;
      border-radius: 10px;
      background: #dcfce7;
      color: #16a34a;
      font-size: 18px;
      font-weight: 700;
    }
    h1 { margin: 0; font-size: 22px; }
    .sub { color: #64748b; margin: 6px 0 24px; font-size: 14px; }
    .sub strong { color: #0f172a; }

    .apps {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
      margin-bottom: 24px;
    }
    .app-btn {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 18px 20px;
      border-radius: 12px;
      border: 1px solid #e2e8f0;
      background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
      color: #fff;
      text-decoration: none;
      transition: transform .15s ease, box-shadow .15s ease;
      box-shadow: 0 6px 16px rgba(79, 70, 229, 0.25);
    }
    .app-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 10px 24px rgba(79, 70, 229, 0.35);
    }
    .app-icon {
      width: 44px;
      height: 44px;
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.18);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }
    .app-meta { flex: 1; min-width: 0; }
    .app-title { font-size: 16px; font-weight: 600; margin: 0 0 2px; }
    .app-desc { font-size: 12px; opacity: 0.85; margin: 0; }
    .app-arrow { font-size: 20px; opacity: 0.9; }

    details {
      border-top: 1px solid #e2e8f0;
      padding-top: 16px;
    }
    summary {
      cursor: pointer;
      color: #64748b;
      font-size: 13px;
      user-select: none;
    }
    summary:hover { color: #334155; }
    code {
      display: block;
      margin-top: 12px;
      background: #0f172a;
      color: #f8fafc;
      padding: 14px;
      border-radius: 8px;
      font-size: 11px;
      word-break: break-all;
      line-height: 1.6;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="header">
      <span class="badge">✓</span>
      <h1>登入成功</h1>
      <a class="logout" href="/sso/logout/">登出</a>
    </div>
    <p class="sub">Hello, <strong>{{ user.display_name|default:user.email }}</strong>，請選擇要進入的應用系統。</p>

    <div class="apps">
      <a class="app-btn" href="{{ edm_url }}">
        <span class="app-icon">✉</span>
        <span class="app-meta">
          <p class="app-title">EDM 行銷管理工具</p>
          <p class="app-desc">電子郵件行銷活動建立與追蹤</p>
        </span>
        <span class="app-arrow">→</span>
      </a>
    </div>

    <details>
      <summary>顯示本次簽發的 Access Token</summary>
      <code>{{ token }}</code>
    </details>
  </div>
</body>
</html>
