<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Middle Platform · SSO 登入</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang TC",
        "Microsoft JhengHei", sans-serif;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #334155 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #0f172a;
    }
    .card {
      width: 100%;
      max-width: 420px;
      background: #ffffff;
      border-radius: 16px;
      padding: 40px 36px;
      box-shadow: 0 20px 60px rgba(15, 23, 42, 0.35);
    }
    .brand {
      font-size: 13px;
      letter-spacing: 3px;
      color: #64748b;
      margin-bottom: 6px;
      text-transform: uppercase;
    }
    h1 {
      margin: 0 0 6px;
      font-size: 22px;
      font-weight: 700;
    }
    .subtitle {
      margin: 0 0 28px;
      font-size: 13px;
      color: #64748b;
    }
    label {
      display: block;
      font-size: 13px;
      color: #475569;
      margin-bottom: 6px;
      font-weight: 500;
    }
    input[type="email"] {
      width: 100%;
      padding: 11px 14px;
      font-size: 14px;
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      margin-bottom: 18px;
      transition: border-color 0.15s, box-shadow 0.15s;
      background: #f8fafc;
    }
    input:focus {
      outline: none;
      border-color: #2563eb;
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15);
      background: #ffffff;
    }
    button {
      width: 100%;
      padding: 12px;
      font-size: 14px;
      font-weight: 600;
      color: #ffffff;
      background: #2563eb;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.15s;
    }
    button:hover { background: #1d4ed8; }
    .error {
      background: #fef2f2;
      color: #b91c1c;
      border: 1px solid #fecaca;
      padding: 10px 12px;
      border-radius: 8px;
      font-size: 13px;
      margin-bottom: 18px;
    }
    .redirect-hint {
      margin-top: 18px;
      font-size: 12px;
      color: #94a3b8;
      text-align: center;
      word-break: break-all;
    }
  </style>
</head>
<body>
  <form class="card" method="post" action="{% url 'sso_login' %}">
    {% csrf_token %}
    <div class="brand">MIDDLE PLATFORM · SSO</div>
    <h1>登入 / 註冊</h1>
    <p class="subtitle">輸入 Email,我們將寄送一次性登入連結給你。首次登入會自動建立帳號。</p>

    {% if error %}
      <div class="error">{{ error }}</div>
    {% endif %}

    <label for="email">Email</label>
    <input id="email" name="email" type="email" value="{{ email|default:'' }}" required autofocus />

    <input type="hidden" name="redirect" value="{{ redirect_url }}" />
    <button type="submit">寄送登入連結</button>

    {% if redirect_url %}
      <div class="redirect-hint">登入後將導回: {{ redirect_url }}</div>
    {% endif %}
  </form>
</body>
</html>
