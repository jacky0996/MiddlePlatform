<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>請查收登入連結</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang TC",
        "Microsoft JhengHei", sans-serif;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #334155 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #0f172a;
      padding: 24px;
    }
    .card {
      width: 100%;
      max-width: 480px;
      background: #fff;
      border-radius: 16px;
      padding: 40px 36px;
      box-shadow: 0 20px 60px rgba(15, 23, 42, 0.35);
      text-align: center;
    }
    .icon {
      width: 64px;
      height: 64px;
      border-radius: 16px;
      background: #dbeafe;
      color: #2563eb;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      margin-bottom: 20px;
    }
    h1 { margin: 0 0 12px; font-size: 22px; }
    p { margin: 0 0 10px; color: #475569; font-size: 14px; line-height: 1.6; }
    .email { color: #0f172a; font-weight: 600; word-break: break-all; }
    .hint {
      margin-top: 24px;
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      padding: 14px;
      font-size: 12px;
      color: #64748b;
      text-align: left;
    }
    .warn {
      background: #fffbeb;
      border: 1px solid #fde68a;
      color: #92400e;
      border-radius: 8px;
      padding: 12px;
      font-size: 13px;
      margin-top: 16px;
    }
    a.back {
      display: inline-block;
      margin-top: 20px;
      font-size: 13px;
      color: #2563eb;
      text-decoration: none;
    }
    a.back:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">✉</div>
    <h1>請查收你的信箱</h1>
    <p>我們已將登入連結寄到:</p>
    <p class="email">{{ email }}</p>

    {% if cooldown_hit %}
      <div class="warn">
        你剛剛已經請求過一次,請稍後再試(或查看剛寄出的那封信)。
      </div>
    {% endif %}

    <div class="hint">
      連結有效時間為 15 分鐘,僅能使用一次。如果沒有收到,請檢查垃圾信匣。<br>
      <strong>開發環境提示:</strong>Email 會印在 Django 容器的 log,可用
      <code>docker compose logs -f web</code> 查看。
    </div>

    <a class="back" href="{% url 'sso_login' %}">← 使用其他 Email</a>
  </div>
</body>
</html>
